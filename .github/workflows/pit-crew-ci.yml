name: pit-crew CI

on:
  push:
    branches: [main]
    paths: ["pit-crew/cli/**"]
  pull_request:
    branches: [main]
    paths: ["pit-crew/cli/**"]

jobs:
  go-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pit-crew/cli
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: pit-crew/cli/go.mod
          cache-dependency-path: pit-crew/cli/go.sum

      - run: go vet ./...
      - run: go build ./cmd/pit-crew
      - run: go test ./...
