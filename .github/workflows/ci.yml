name: CI

on:
  push:
    branches: [main]
    paths: ["crosscheck/**"]
  pull_request:
    branches: [main]
    paths: ["crosscheck/**"]

jobs:
  ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crosscheck/mcp-server
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: crosscheck/mcp-server/package-lock.json

      - run: npm ci
      # TODO: make blocking after lint violations are fixed
      - run: npm run lint
        continue-on-error: true
      - run: npm run build
      - run: npm test
