name: xylem CI

on:
  push:
    branches: [main]
    paths: ["xylem/cli/**"]
  pull_request:
    branches: [main]
    paths: ["xylem/cli/**"]

jobs:
  go-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: xylem/cli
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: xylem/cli/go.mod
          cache-dependency-path: xylem/cli/go.sum

      - run: go vet ./...
      - run: go build ./cmd/xylem
      - run: go test ./...
