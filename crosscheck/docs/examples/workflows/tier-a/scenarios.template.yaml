scenarios:

  # ─── Flow 1: in-memory work queue ─────────────────────────────────────────

  - id: QUEUE-001
    flow: work-queue
    name: FIFO ordering preserved across enqueue/dequeue
    description: >
      A work queue must dequeue items in the order they were enqueued.
      This is the ordering contract documented as Invariant I1 in
      docs/invariants/queue.md. Three items enqueued in order A, B, C
      must dequeue as A, then B, then C — no reordering, no duplicates,
      no losses.
    target:
      module: queue.work_queue
      function: WorkQueue.dequeue
    inputs:
      enqueue_order: ["A", "B", "C"]
    assertions:
      - id: QUEUE-001-A1
        description: Dequeue produces items in enqueue order
        check: assert dequeued == ["A", "B", "C"]
        verifiable: true

      - id: QUEUE-001-A2
        description: Queue is empty after all items dequeued
        check: assert q.size() == 0
        verifiable: true

      - id: QUEUE-001-A3
        description: No item is delivered more than once
        check: assert len(dequeued) == len(set(dequeued))
        verifiable: true
        rationale: >
          Duplicate delivery would indicate a missing acknowledgement
          step or a race in the dequeue path. Deduping at the consumer
          would mask the queue-side defect.

    layer: "Layer 5 (empirical)"
    status: skeleton

  - id: QUEUE-002
    flow: work-queue
    name: Failed-terminal items land in dead-letter, never re-enter main queue
    description: >
      An item that fails more than max_retries times must move to the
      dead-letter queue and must NOT be redelivered to the main queue
      under any subsequent dequeue. This is Invariant I2 in
      docs/invariants/queue.md (failed-terminal sampling). Regression
      here would silently retry poison messages forever.
    target:
      module: queue.work_queue
      function: WorkQueue.dequeue
    inputs:
      max_retries: 3
      poison_item: "P"
    assertions:
      - id: QUEUE-002-A1
        description: After max_retries failures, poison item is in dead-letter
        check: assert "P" in q.dead_letter()
        verifiable: true

      - id: QUEUE-002-A2
        description: Poison item is NOT in the main queue
        check: assert "P" not in q.snapshot()
        verifiable: true

      - id: QUEUE-002-A3
        description: >
          Subsequent dequeue calls do not return the poison item even
          when the main queue is otherwise empty. This is the load-bearing
          assertion — the others can pass while this one fails if the
          dead-letter promotion is wired but the dequeue path doesn't
          consult it.
        check: |
          for _ in range(10):
            item = q.dequeue(timeout=0.0)
            assert item != "P", f"poison item leaked back into main queue"
        verifiable: true
        rationale: >
          A2 checks state at one instant; A3 checks the dynamic invariant
          across repeated dequeue. This is the "failed-terminal sampling"
          property the invariant doc names.

    layer: "Layer 5 (empirical)"
    status: skeleton
