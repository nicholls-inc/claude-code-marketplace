# Invariant coverage gate (Layer 4 mechanical enforcement).
#
# Cross-checks invariant IDs declared in docs/invariants/**/*.md against
# `# Invariant <ID>: <Name>` comments in tests/**/test_*.py. Catches silent
# test drops and orphan test comments. Aspirational invariants (declared
# but not yet covered) are flagged with `<!-- aspirational -->` on the
# header line and skipped by the missing-coverage check.
#
# Mirrors the local `invariant-coverage` pre-commit hook in
# .pre-commit-config.yaml. The dual-track principle in
# docs/assurance/ROADMAP.md requires both enforcement points.
# Implementation: scripts/check_invariant_coverage.py.
#
# Security note: this workflow uses only static strings; it does not
# consume any github.event.* inputs and is not subject to workflow
# injection.

name: assurance

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: assurance-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  invariant-coverage:
    name: invariant-coverage
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python 3.11
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.11'

      - name: Run invariant coverage check
        run: python3 scripts/check_invariant_coverage.py
