name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      prs_created: ${{ steps.release.outputs.prs_created }}
      pr: ${{ steps.release.outputs.pr }}
    steps:
      - id: release
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build-assets:
    if: ${{ needs.release-please.outputs.prs_created == 'true' }}
    needs: release-please
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ fromJSON(needs.release-please.outputs.pr).headBranchName }}

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: crosscheck/mcp-server/package-lock.json

      - run: npm ci
        working-directory: crosscheck/mcp-server

      - run: npm run build
        working-directory: crosscheck/mcp-server

      - run: |
          if git diff --quiet -- crosscheck/mcp-server/dist; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add crosscheck/mcp-server/dist
          git commit -m "chore(crosscheck): update dist assets"
          git push
